<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 FIFA World Cup Bracket</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap');

  :root {
    --bg:      #0a0a0f;
    --surface: #13131e;
    --border:  #2a2a3d;
    --accent:  #c9a84c;
    --win:     rgba(46,125,82,0.22);
    --text:    #e8e8f0;
    --muted:   #6b6b8a;
    --live:    #e85c4a;
    --pending: #1c1c2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  #scale-wrap {
    display: inline-block;
    width: max-content;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .header-left { display: flex; align-items: center; gap: 12px; }
  .trophy { font-size: 24px; }

  header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
  }
  header h1 span { color: var(--text); font-weight: 400; }

  .status-bar {
    display: flex; align-items: center; gap: 16px;
    font-size: 10px; color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.05em; text-transform: uppercase;
  }

  .pulse {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--accent);
    animation: pulse 2s ease-in-out infinite; margin-right: 3px;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.4; transform:scale(0.7); }
  }

  .bracket-wrap {
    padding: 16px 16px 24px;
    display: flex;
    gap: 0;
    align-items: flex-start;
  }

  /* Each round column */
  .round {
    display: flex;
    flex-direction: column;
    min-width: 170px;
  }

  .round-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); text-align: center;
    padding: 0 8px 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
  }

  .round-matches { display: flex; flex-direction: column; }

  .match-slot {
    display: flex;
    align-items: center;
    padding: 6px 8px;
  }

  /* SVG connector column */
  .connector-col {
    display: flex;
    flex-direction: column;
    padding-top: 31px; /* align with first card */
  }

  /* MATCH CARD */
  .match {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    width: 154px;
    overflow: hidden;
    transition: border-color 0.2s;
    position: relative;
  }
  .match:hover { border-color: var(--accent); }
  .match.live  { border-color: var(--live); }
  .live-badge {
    position: absolute; top: 3px; right: 5px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 8px; font-weight: 700; letter-spacing: 0.1em;
    color: var(--live);
  }

  .team-row {
    display: flex; align-items: center;
    padding: 5px 8px; gap: 6px;
    border-bottom: 1px solid var(--border);
    min-height: 26px;
  }
  .team-row:last-of-type { border-bottom: none; }
  .team-row.winner    { background: var(--win); }
  .team-row.elim      { opacity: 0.38; }
  .team-row.pending   { background: var(--pending); }

  .t-flag { font-size: 13px; width: 18px; text-align: center; flex-shrink: 0; line-height: 1; }
  .t-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.04em; text-transform: uppercase;
    flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .team-row.pending .t-name {
    color: var(--muted); font-size: 9px; font-weight: 400;
  }
  .t-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 700; color: var(--accent);
    min-width: 12px; text-align: right; flex-shrink: 0;
  }
  .team-row.pending .t-score { color: var(--muted); }

  .match-meta {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px; color: var(--muted);
    text-align: center; padding: 3px 6px;
    border-top: 1px solid var(--border);
    white-space: nowrap;
  }
  .match-meta.live-meta { color: var(--live); font-weight: 700; }

  /* Champion box */
  .champion-wrap {
    display: flex;
    align-items: center;
    padding-top: 31px;
  }
  .connector-final {
    width: 28px;
    display: flex;
    align-items: center;
  }
  .champion-box {
    background: linear-gradient(135deg, #1a1608, #13131e);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 12px 14px;
    text-align: center;
    width: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .champ-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 4px;
  }
  .champ-flag { font-size: 26px; display: block; margin: 4px 0; }
  .champ-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 900;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
</style>
</head>

// ── HELPERS ──────────────────────────────────────────────
function winnerOf(m) {
  if (!m || m.st !== 'final') return null;
  if (m.hS > m.aS) return m.home;
  if (m.aS > m.hS) return m.away;
  return null;
}

function buildMap(data) {
  const map = {};
  ['r32','r16','qf','sf'].forEach(rnd => (data[rnd]||[]).forEach(m => { map[m.id]=m; }));
  map[data.final.id] = data.final;
  return map;
}

function resolveRef(ref, map) {
  if (!ref) return {code:null,label:'TBD',pending:true};
  if (ref.startsWith('W:')) {
    const src = map[ref.slice(2)];
    if (!src) return {code:null,label:'TBD',pending:true};
    const w = winnerOf(src);
    if (w) return {code:w,label:w,pending:false};
    return {code:null,label:`W·M${src.mn}`,pending:true};
  }
  return {code:ref,label:ref,pending:false};
}

function resolveAll(raw) {
  const data = JSON.parse(JSON.stringify(raw));
  const map = buildMap(data);
  const res = m => {
    if (m.home && m.away) return m;
    const h = resolveRef(m.hrRef, map);
    const a = resolveRef(m.arRef, map);
    return {...m, home:h.code,homeLabel:h.label,homePending:h.pending,
                  away:a.code,awayLabel:a.label,awayPending:a.pending};
  };
  ['r16','qf','sf'].forEach(rnd => { data[rnd] = data[rnd].map(res); });
  data.final = res(data.final);
  return data;
}

// ── RENDER ───────────────────────────────────────────────
function teamRowHTML(m, side) {
  const isPending = m[side+'Pending'];
  const code  = m[side];
  const label = m[side+'Label'] || code || 'TBD';
  const score = side==='home' ? m.hS : m.aS;
  const w = winnerOf(m);
  const won  = code && w===code;
  const lost = code && w && w!==code;

  let cls = 'team-row';
  if (isPending) cls += ' pending';
  else if (won)  cls += ' winner';
  else if (lost) cls += ' elim';

  const flagHTML = isPending
    ? `<span class="t-flag" style="font-size:9px;color:var(--muted)">▪</span>`
    : `<span class="t-flag">${code ? fl(code) : '⬜'}</span>`;

  const showScore = !isPending && m.st!=='tbd' && m.st!=='scheduled' && score!==null;
  return `<div class="${cls}">
    ${flagHTML}
    <span class="t-name">${label}</span>
    <span class="t-score">${showScore ? score : '–'}</span>
  </div>`;
}

function matchHTML(m) {
  const isLive = m.st==='live'||m.st==='inprogress';
  const isFinal = m.st==='final';
  const meta = isLive ? '● LIVE'
    : isFinal ? `FT · ${m.dt||''}`
    : `${m.dt||''}${m.tm?' · '+m.tm:''}`;
  return `<div class="match${isLive?' live':''}">
    ${isLive?'<span class="live-badge">LIVE</span>':''}
    ${teamRowHTML(m,'home')}
    ${teamRowHTML(m,'away')}
    <div class="match-meta${isLive?' live-meta':''}">${meta}</div>
  </div>`;
}

// Slot heights: each round's slot is 2x the previous
// R32: 1 unit, R16: 2 units, QF: 4 units, SF: 8 units, F: 16 units
const SLOT_BASE = 88; // px — height of one R32 slot

function roundHTML(label, matches, slotH) {
  const slots = matches.map(m => `
    <div class="match-slot" style="height:${slotH}px;min-height:${slotH}px;">
      ${matchHTML(m)}
    </div>`).join('');
  return `<div class="round">
    <div class="round-header">${label}</div>
    <div class="round-matches">${slots}</div>
  </div>`;
}

function connectorSVG(count, slotH, totalH) {
  const pairs = count / 2;
  let paths = '';
  for (let i=0; i<pairs; i++) {
    const topY = i*2*slotH + slotH/2;
    const botY = (i*2+1)*slotH + slotH/2;
    const midY = (topY+botY)/2;
    const mx = 18;
    paths += `
      <line x1="0"   y1="${topY}" x2="${mx}"  y2="${topY}" stroke="#2a2a3d" stroke-width="1.2"/>
      <line x1="0"   y1="${botY}" x2="${mx}"  y2="${botY}" stroke="#2a2a3d" stroke-width="1.2"/>
      <line x1="${mx}" y1="${topY}" x2="${mx}" y2="${botY}" stroke="#2a2a3d" stroke-width="1.2"/>
      <line x1="${mx}" y1="${midY}" x2="28"   y2="${midY}" stroke="#2a2a3d" stroke-width="1.2"/>`;
  }
  return `<div class="connector-col" style="height:${totalH}px;">
    <svg width="28" height="${totalH}" xmlns="http://www.w3.org/2000/svg">${paths}</svg>
  </div>`;
}

function renderBracket(data) {
  data = resolveAll(data);

  const S = SLOT_BASE;
  const r32H  = S,      r32Total  = 16*S;
  const r16H  = S*2,    r16Total  = 8*S*2;
  const qfH   = S*4,    qfTotal   = 4*S*4;
  const sfH   = S*8,    sfTotal   = 2*S*8;
  const finH  = S*16,   finTotal  = S*16;

  // Final connector line (simple horizontal)
  const finConnY = finH/2;
  const finConn = `<div class="connector-col" style="height:${finTotal}px;">
    <svg width="28" height="${finTotal}" xmlns="http://www.w3.org/2000/svg">
      <line x1="0" y1="${finConnY}" x2="28" y2="${finConnY}" stroke="#c9a84c" stroke-width="1.2" opacity="0.6"/>
    </svg>
  </div>`;

  // Champion
  const champ = data.champion;
  const champHTML = `<div class="champion-wrap" style="height:${finTotal}px;">
    <div class="connector-final">
      <svg width="28" height="${finTotal}" xmlns="http://www.w3.org/2000/svg">
        <line x1="0" y1="${finConnY}" x2="28" y2="${finConnY}" stroke="#c9a84c" stroke-width="1.2" opacity="0.6"/>
      </svg>
    </div>
    <div class="champion-box">
      <div class="champ-label">🏆 Champion</div>
      ${champ
        ? `<span class="champ-flag">${fl(champ)}</span><div class="champ-name">${champ}</div>`
        : `<div class="champ-name" style="color:var(--muted);font-size:10px;font-weight:400;">Awaiting Final</div>`}
    </div>
  </div>`;

  return `
    ${roundHTML('Round of 32', data.r32, r32H)}
    ${connectorSVG(16, r32H, r32Total)}
    ${roundHTML('Round of 16', data.r16, r16H)}
    ${connectorSVG(8, r16H, r16Total)}
    ${roundHTML('Quarter-Finals', data.qf, qfH)}
    ${connectorSVG(4, qfH, qfTotal)}
    ${roundHTML('Semi-Finals', data.sf, sfH)}
    ${connectorSVG(2, sfH, sfTotal)}
    ${roundHTML('Final · Jul 19', [data.final], finH)}
    ${champHTML}
  `;
}

// ── LIVE DATA ─────────────────────────────────────────────
async function fetchLive() {
  try {
    const r = await fetch(WORKER_URL, {cache:'no-store'});
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch(e) {
    console.warn('[WC Bracket] Worker fetch failed:', e.message);
    return null;
  }
}

function applyLive(raw, espn) {
  const data = JSON.parse(JSON.stringify(raw));
  if (!espn?.events) return data;
  const evs = espn.events;
  const upd = matches => matches.map(m => {
    if (!m.home || !m.away) return m;
    const ev = evs.find(e => {
      const ab = (e.competitions?.[0]?.competitors||[]).map(c=>c.team?.abbreviation?.toUpperCase());
      return ab.includes(m.home?.toUpperCase()) && ab.includes(m.away?.toUpperCase());
    });
    if (!ev) return m;
    const comps = ev.competitions?.[0]?.competitors||[];
    const hc = comps.find(c=>c.team?.abbreviation?.toUpperCase()===m.home?.toUpperCase());
    const ac = comps.find(c=>c.team?.abbreviation?.toUpperCase()===m.away?.toUpperCase());
    const st = ev.status?.type?.name||'';
    return {...m,
      hS: hc?.score!=null?parseInt(hc.score):m.hS,
      aS: ac?.score!=null?parseInt(ac.score):m.aS,
      st: st==='STATUS_FINAL'?'final':st==='STATUS_IN_PROGRESS'?'live':'scheduled'
    };
  });
  data.r32=upd(data.r32); data.r16=upd(data.r16);
  data.qf=upd(data.qf);   data.sf=upd(data.sf);
  data.final=upd([data.final])[0];
  return data;
}

// ── COUNTDOWN ─────────────────────────────────────────────
let secs = REFRESH_MS/1000, tick = null;
function startTick() {
  secs = REFRESH_MS/1000;
  clearInterval(tick);
  tick = setInterval(()=>{
    secs = Math.max(0,secs-1);
    const el = document.getElementById('countdown');
    if (el) el.textContent = `Next: ${Math.floor(secs/60)}:${(secs%60).toString().padStart(2,'0')}`;
  },1000);
}

// ── AUTO-SCALE ────────────────────────────────────────────
function scaleToFit() {
  const wrap = document.getElementById('scale-wrap');
  if (!wrap) return;
  const nw = wrap.scrollWidth, nh = wrap.scrollHeight;
  if (!nw || !nh) return;
  const scale = Math.min(window.innerWidth/nw, window.innerHeight/nh);
  wrap.style.transform = `scale(${scale})`;
  wrap.style.transformOrigin = 'top left';
  document.body.style.width  = (nw*scale)+'px';
  document.body.style.height = (nh*scale)+'px';
  document.body.style.overflow = 'hidden';
}
window.addEventListener('resize', scaleToFit);

// ── MAIN LOOP ─────────────────────────────────────────────
async function refresh() {
  const live  = await fetchLive();
  const state = applyLive(JSON.parse(JSON.stringify(SEED)), live);
  document.getElementById('bracket-root').innerHTML = renderBracket(state);
  const el = document.getElementById('last-updated');
  if (el) el.textContent = 'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  startTick();
  setTimeout(scaleToFit, 100);
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
