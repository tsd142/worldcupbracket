<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 FIFA World Cup Bracket</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap');

  :root {
    --bg:      #0a0a0f;
    --surface: #13131e;
    --border:  #2a2a3d;
    --accent:  #c9a84c;
    --win:     rgba(46,125,82,0.22);
    --text:    #e8e8f0;
    --muted:   #6b6b8a;
    --live:    #e85c4a;
    --pending: #1c1c2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  #scale-wrap { display: inline-block; width: max-content; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .trophy { font-size: 24px; }
  header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 900;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--accent);
  }
  header h1 span { color: var(--text); font-weight: 400; }
  .status-bar {
    display: flex; align-items: center; gap: 16px;
    font-size: 10px; color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .pulse {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--accent);
    animation: pulse 2s ease-in-out infinite; margin-right: 3px;
  }
  @keyframes pulse {
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:0.4;transform:scale(0.7)}
  }

  .bracket-wrap {
    padding: 16px 16px 24px;
    display: flex; gap: 0; align-items: flex-start;
  }

  .round { display: flex; flex-direction: column; min-width: 170px; }
  .round-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); text-align: center;
    padding: 0 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .round-matches { display: flex; flex-direction: column; }
  .match-slot { display: flex; align-items: center; padding: 6px 8px; }
  .connector-col { display: flex; flex-direction: column; padding-top: 31px; }

  .match {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px; width: 154px;
    overflow: hidden; position: relative;
    transition: border-color 0.2s;
  }
  .match:hover { border-color: var(--accent); }
  .match.live  { border-color: var(--live); }
  .live-badge {
    position: absolute; top: 3px; right: 5px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 8px; font-weight: 700; letter-spacing: 0.1em;
    color: var(--live);
  }

  .team-row {
    display: flex; align-items: center;
    padding: 5px 8px; gap: 6px;
    border-bottom: 1px solid var(--border); min-height: 26px;
  }
  .team-row:last-of-type { border-bottom: none; }
  .team-row.winner  { background: var(--win); }
  .team-row.elim    { opacity: 0.38; }
  .team-row.pending { background: var(--pending); }

  .t-flag { font-size: 13px; width: 18px; text-align: center; flex-shrink: 0; line-height: 1; }
  .t-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.04em; text-transform: uppercase;
    flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .team-row.pending .t-name { color: var(--muted); font-size: 9px; font-weight: 400; }
  .t-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 700; color: var(--accent);
    min-width: 12px; text-align: right; flex-shrink: 0;
  }
  .team-row.pending .t-score { color: var(--muted); }

  .match-meta {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px; color: var(--muted);
    text-align: center; padding: 3px 6px;
    border-top: 1px solid var(--border); white-space: nowrap;
  }
  .match-meta.live-meta { color: var(--live); font-weight: 700; }

  .champion-wrap { display: flex; align-items: center; padding-top: 31px; }
  .champion-box {
    background: linear-gradient(135deg, #1a1608, #13131e);
    border: 1px solid var(--accent); border-radius: 8px;
    padding: 12px 14px; text-align: center; width: 120px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .champ-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 4px;
  }
  .champ-flag { font-size: 26px; display: block; margin: 4px 0; }
  .champ-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 900; letter-spacing: 0.06em; text-transform: uppercase;
  }
</style>

// ── BUILD BRACKET FROM ESPN DATA ──────────────────────────
// ESPN returns events[] with status and competitors.
// We sort by start_time and group by round name to build the bracket.

const ROUND_ORDER = ['Round of 32','Round of 16','Quarterfinals','Semifinals','Final'];

function shortName(fullName) {
  // Map ESPN full team names to 3-letter codes we have flags for
  const MAP = {
    'Canada':'CAN','South Africa':'RSA','Brazil':'BRA','Japan':'JPN',
    'Germany':'GER','Netherlands':'NED','Morocco':'MAR','USA':'USA',
    'United States':'USA','Bosnia-Herzegovina':'BIH','Bosnia and Herzegovina':'BIH',
    'Ivory Coast':'CIV',"Côte d'Ivoire":'CIV','Mexico':'MEX','Argentina':'ARG',
    'Australia':'AUS','Switzerland':'SUI','France':'FRA','Senegal':'SEN',
    'Spain':'ESP','Cape Verde':'CPV','Egypt':'EGY','Belgium':'BEL',
    'England':'ENG','Croatia':'CRO','Portugal':'POR','Congo DR':'COD',
    'DR Congo':'COD','Uruguay':'URU','Saudi Arabia':'KSA','Norway':'NOR',
    'Sweden':'SWE','Colombia':'COL','New Zealand':'NZL','Panama':'PAN',
    'Ecuador':'ECU','Korea Republic':'KOR','South Korea':'KOR',
    'Tunisia':'TUN','Paraguay':'PAR','Turkey':'TUR','Türkiye':'TUR',
    'Netherlands':'NED','Iraq':'IRQ','Curacao':'CUW','Curaçao':'CUW',
    'Uzbekistan':'UZB','Scotland':'SCO','Haiti':'HTI','Czech Republic':'CZE',
    'Czechia':'CZE','IR Iran':'IRN','Iran':'IRN','Ghana':'GHA',
  };
  return MAP[fullName] || fullName?.slice(0,3).toUpperCase() || '?';
}

function espnStatusToSt(statusName) {
  if (statusName === 'STATUS_FINAL')       return 'final';
  if (statusName === 'STATUS_IN_PROGRESS') return 'live';
  return 'scheduled';
}

function fmtDateTime(isoStr) {
  if (!isoStr) return {dt:'TBD', tm:''};
  const d = new Date(isoStr);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dt = `${months[d.getMonth()]} ${d.getDate()}`;
  const h  = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  const tm = `${h12}:${m.toString().padStart(2,'0')} ${ampm} ET`;
  return {dt, tm};
}

function buildBracketFromESPN(espn) {
  if (!espn?.events?.length) return null;

  // Group events by round
  const rounds = {};
  ROUND_ORDER.forEach(r => rounds[r] = []);

  espn.events.forEach(ev => {
    const roundName = ev.competitions?.[0]?.series?.slug
      || ev.season?.slug
      || ev.competitions?.[0]?.type?.abbreviation
      || '';

    // ESPN uses these names in the bracket
    let rnd = null;
    const name = (ev.name || ev.shortName || '').toLowerCase();
    const note = (ev.competitions?.[0]?.notes?.[0]?.headline || '').toLowerCase();
    const headline = note || name;

    if (headline.includes('round of 32') || headline.includes('rd32')) rnd = 'Round of 32';
    else if (headline.includes('round of 16') || headline.includes('rd16')) rnd = 'Round of 16';
    else if (headline.includes('quarterfinal') || headline.includes('quarter-final')) rnd = 'Quarterfinals';
    else if (headline.includes('semifinal') || headline.includes('semi-final')) rnd = 'Semifinals';
    else if (headline.includes('final') && !headline.includes('semi') && !headline.includes('quarter') && !headline.includes('3rd') && !headline.includes('third')) rnd = 'Final';

    if (!rnd) return;

    const comp = ev.competitions?.[0];
    const comps = comp?.competitors || [];
    const home = comps.find(c => c.homeAway === 'home') || comps[0];
    const away = comps.find(c => c.homeAway === 'away') || comps[1];

    const homeCode = home?.team?.abbreviation ? shortName(home.team.displayName) : null;
    const awayCode = away?.team?.abbreviation ? shortName(away.team.displayName) : null;
    const homeLabel = home?.team?.displayName || home?.team?.abbreviation || 'TBD';
    const awayLabel = away?.team?.displayName || away?.team?.abbreviation || 'TBD';

    const st = espnStatusToSt(ev.status?.type?.name || '');
    const {dt, tm} = fmtDateTime(ev.date);

    const hS = (st !== 'scheduled' && home?.score != null) ? parseInt(home.score) : null;
    const aS = (st !== 'scheduled' && away?.score != null) ? parseInt(away.score) : null;

    rounds[rnd].push({
      id: ev.id,
      mn: parseInt(ev.id) || 0,
      home: homeCode, homeLabel: homeCode || homeLabel, homePending: !homeCode,
      away: awayCode, awayLabel: awayCode || awayLabel, awayPending: !awayCode,
      hS, aS, st, dt, tm,
      startTime: ev.date,
    });
  });

  // Sort each round by start time
  ROUND_ORDER.forEach(r => {
    rounds[r].sort((a,b) => new Date(a.startTime) - new Date(b.startTime));
  });

  return rounds;
}

// ── RENDER ───────────────────────────────────────────────
function winnerOf(m) {
  if (!m || m.st !== 'final') return null;
  if (m.hS > m.aS) return m.home;
  if (m.aS > m.hS) return m.away;
  return null;
}

function teamRowHTML(m, side) {
  const isPending = m[side+'Pending'];
  const code  = m[side];
  const label = m[side+'Label'] || code || 'TBD';
  const score = side==='home' ? m.hS : m.aS;
  const w = winnerOf(m);
  const won  = code && w===code;
  const lost = code && w && w!==code;

  let cls = 'team-row';
  if (isPending) cls += ' pending';
  else if (won)  cls += ' winner';
  else if (lost) cls += ' elim';

  const flagHTML = isPending
    ? `<span class="t-flag" style="font-size:9px;color:var(--muted)">▪</span>`
    : `<span class="t-flag">${fl(code)}</span>`;

  const showScore = !isPending && m.st!=='tbd' && m.st!=='scheduled' && score!==null;
  return `<div class="${cls}">
    ${flagHTML}
    <span class="t-name">${label}</span>
    <span class="t-score">${showScore ? score : '–'}</span>
  </div>`;
}

function matchHTML(m) {
  const isLive  = m.st==='live'||m.st==='inprogress';
  const isFinal = m.st==='final';
  const meta = isLive  ? '● LIVE'
    : isFinal ? `FT · ${m.dt||''}`
    : `${m.dt||''}${m.tm?' · '+m.tm:''}`;
  return `<div class="match${isLive?' live':''}">
    ${isLive?'<span class="live-badge">LIVE</span>':''}
    ${teamRowHTML(m,'home')}
    ${teamRowHTML(m,'away')}
    <div class="match-meta${isLive?' live-meta':''}">${meta}</div>
  </div>`;
}

const SLOT_BASE = 88;

function roundHTML(label, matches, slotH) {
  const slots = matches.map(m => `
    <div class="match-slot" style="height:${slotH}px;min-height:${slotH}px;">
      ${matchHTML(m)}
    </div>`).join('');
  return `<div class="round">
    <div class="round-header">${label}</div>
    <div class="round-matches">${slots}</div>
  </div>`;
}

function connectorSVG(count, slotH) {
  const totalH = count * slotH;
  const pairs  = count / 2;
  let paths = '';
  for (let i=0; i<pairs; i++) {
    const topY = i*2*slotH + slotH/2;
    const botY = (i*2+1)*slotH + slotH/2;
    const midY = (topY+botY)/2;
    const mx = 18;
    paths += `
      <line x1="0"    y1="${topY}" x2="${mx}" y2="${topY}" stroke="#2a2a3d" stroke-width="1.2"/>
      <line x1="0"    y1="${botY}" x2="${mx}" y2="${botY}" stroke="#2a2a3d" stroke-width="1.2"/>
      <line x1="${mx}" y1="${topY}" x2="${mx}" y2="${botY}" stroke="#2a2a3d" stroke-width="1.2"/>
      <line x1="${mx}" y1="${midY}" x2="28"   y2="${midY}" stroke="#2a2a3d" stroke-width="1.2"/>`;
  }
  return `<div class="connector-col" style="height:${totalH}px;">
    <svg width="28" height="${totalH}" xmlns="http://www.w3.org/2000/svg">${paths}</svg>
  </div>`;
}

  const roundKeys = ROUND_ORDER;

  let html = '';
  roundKeys.forEach((rnd, i) => {
    const matches = rounds[rnd] || [];
    const n = counts[i];
    const slotH = S * Math.pow(2, i);
    // Pad with empty TBD matches if ESPN hasn't filled them yet
    while (matches.length < n) {
      matches.push({id:`tbd_${i}_${matches.length}`,home:null,homeLabel:'TBD',homePending:true,
        away:null,awayLabel:'TBD',awayPending:true,hS:null,aS:null,st:'tbd',dt:'',tm:''});
    }
    html += roundHTML(labels[i], matches.slice(0,n), slotH);
    if (i < roundKeys.length - 1) {
      html += connectorSVG(n, slotH);
    }
  });

  // Final connector + champion
  const finalMatch = (rounds['Final']||[])[0];
  const champ = finalMatch && winnerOf(finalMatch) ? winnerOf(finalMatch) : null;
  const finH  = S * 16;
  const finConnY = finH / 2;
  html += `<div class="champion-wrap" style="height:${finH}px;">
    <div style="flex-shrink:0;">
      <svg width="28" height="${finH}" xmlns="http://www.w3.org/2000/svg">
        <line x1="0" y1="${finConnY}" x2="28" y2="${finConnY}" stroke="#c9a84c" stroke-width="1.2" opacity="0.6"/>
      </svg>
    </div>
    <div class="champion-box">
      <div class="champ-label">🏆 Champion</div>
      ${champ
        ? `<span class="champ-flag">${fl(champ)}</span><div class="champ-name">${champ}</div>`
        : `<div class="champ-name" style="color:var(--muted);font-size:10px;font-weight:400;">Awaiting Final</div>`}
    </div>
  </div>`;

  return html;
}

// ── LIVE FETCH ────────────────────────────────────────────
async function fetchLive() {
  try {
    const r = await fetch(WORKER_URL, {cache:'no-store'});
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch(e) {
    console.warn('[WC Bracket] Worker fetch failed:', e.message);
    return null;
  }
}

// ── COUNTDOWN ─────────────────────────────────────────────
let secs = REFRESH_MS/1000, tick = null;
function startTick() {
  secs = REFRESH_MS/1000;
  clearInterval(tick);
  tick = setInterval(()=>{
    secs = Math.max(0, secs-1);
    const el = document.getElementById('countdown');
    if (el) el.textContent = `Next: ${Math.floor(secs/60)}:${(secs%60).toString().padStart(2,'0')}`;
  }, 1000);
}

// ── AUTO-SCALE ────────────────────────────────────────────
function scaleToFit() {
  const wrap = document.getElementById('scale-wrap');
  if (!wrap) return;
  const nw = wrap.scrollWidth, nh = wrap.scrollHeight;
  if (!nw || !nh) return;
  const scale = Math.min(window.innerWidth/nw, window.innerHeight/nh);
  wrap.style.transform = `scale(${scale})`;
  wrap.style.transformOrigin = 'top left';
  document.body.style.width  = (nw*scale)+'px';
  document.body.style.height = (nh*scale)+'px';
  document.body.style.overflow = 'hidden';
}
window.addEventListener('resize', scaleToFit);

// ── MAIN LOOP ─────────────────────────────────────────────
async function refresh() {
  const espn   = await fetchLive();
  const rounds  = buildBracketFromESPN(espn) || FALLBACK;
  document.getElementById('bracket-root').innerHTML = renderBracket(rounds);
  const el = document.getElementById('last-updated');
  if (el) el.textContent = 'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  startTick();
  setTimeout(scaleToFit, 100);
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
